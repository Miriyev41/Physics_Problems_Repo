<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 04 - Circular Motion Visualization</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #111827; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }
        label {
            font-weight: bold;
            min-width: 120px;
        }
        input[type="range"] {
            flex-grow: 1;
        }
        span.value-display {
            min-width: 60px;
            text-align: right;
            font-family: monospace;
            font-size: 1.1em;
        }
        button {
            padding: 10px 15px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2563eb; }
        canvas {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 100%;
            margin-top: 20px;
            display: block;
        }
        .stats {
            margin-top: 15px;
            padding: 15px;
            background: #1f2937;
            color: #10b981;
            border-radius: 6px;
            font-family: monospace;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-weight: bold;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 16px; height: 16px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Circular Motion Animation</h1>
    <p>Visualizing the vectors $\vec r$, $\vec v$, and $\vec a$ in uniform circular motion.</p>

    <div class="controls">
        <div class="control-group">
            <label for="rSlider">Radius (R):</label>
            <input type="range" id="rSlider" min="1" max="5" step="0.5" value="3">
            <span class="value-display" id="rValue">3.0 m</span>
        </div>
        <div class="control-group">
            <label for="omegaSlider">Angular Vel (ω):</label>
            <input type="range" id="omegaSlider" min="0.5" max="3" step="0.1" value="1">
            <span class="value-display" id="omegaValue">1.0 rad/s</span>
        </div>
        <button id="toggleBtn">Pause</button>
    </div>

    <div class="stats" id="statsDisplay">
        <div id="rStat">|r| = 0.00 m</div>
        <div id="vStat">|v| = 0.00 m/s</div>
        <div id="aStat">|a| = 0.00 m/s²</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background:#3b82f6;"></div> r(t) [Position]</div>
        <div class="legend-item"><div class="color-box" style="background:#10b981;"></div> v(t) [Velocity]</div>
        <div class="legend-item"><div class="color-box" style="background:#ef4444;"></div> a(t) [Acceleration]</div>
    </div>

    <canvas id="plotCanvas" width="600" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('plotCanvas');
    const ctx = canvas.getContext('2d');
    
    const rSlider = document.getElementById('rSlider');
    const omegaSlider = document.getElementById('omegaSlider');
    const rValue = document.getElementById('rValue');
    const omegaValue = document.getElementById('omegaValue');
    const toggleBtn = document.getElementById('toggleBtn');
    
    const rStat = document.getElementById('rStat');
    const vStat = document.getElementById('vStat');
    const aStat = document.getElementById('aStat');

    let isPlaying = true;
    let animationId = null;
    let time = 0;
    let lastTimestamp = 0;

    function drawArrow(ctx, fromX, fromY, toX, toY, color) {
        const headlen = 12; 
        const dx = toX - fromX;
        const dy = toY - fromY;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 3;
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.lineTo(toX, toY);
        ctx.fill();
    }

    function render(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        let dt = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        if (isPlaying) {
            time += dt;
        }

        const R = parseFloat(rSlider.value);
        const omega = parseFloat(omegaSlider.value);

        rValue.innerText = R.toFixed(1) + " m";
        omegaValue.innerText = omega.toFixed(1) + " rad/s";

        const vMag = R * omega;
        const aMag = R * omega * omega;

        rStat.innerText = `|r| = ${R.toFixed(2)} m`;
        vStat.innerText = `|v| = ${vMag.toFixed(2)} m/s`;
        aStat.innerText = `|a| = ${aMag.toFixed(2)} m/s²`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // Scale factor: 1 unit of R = 40 pixels
        const scale = 40;

        // Draw axes
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY);
        ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height);
        ctx.stroke();

        // Draw circular path
        ctx.beginPath();
        ctx.strokeStyle = '#9ca3af';
        ctx.setLineDash([5, 5]);
        ctx.arc(centerX, centerY, R * scale, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.setLineDash([]);

        // Calculate positions
        const x = R * Math.cos(omega * time);
        const y = R * Math.sin(omega * time);
        
        const vx = -R * omega * Math.sin(omega * time);
        const vy = R * omega * Math.cos(omega * time);
        
        const ax = -R * omega * omega * Math.cos(omega * time);
        const ay = -R * omega * omega * Math.sin(omega * time);

        const screenX = centerX + x * scale;
        const screenY = centerY - y * scale; // Y is inverted in canvas

        // Vector visualization scaling (make vectors visible relative to path)
        const vScale = 0.5;
        const aScale = 0.2;

        // Position vector (Blue)
        drawArrow(ctx, centerX, centerY, screenX, screenY, '#3b82f6');
        
        // Velocity vector (Green)
        drawArrow(ctx, screenX, screenY, screenX + vx * scale * vScale, screenY - vy * scale * vScale, '#10b981');
        
        // Acceleration vector (Red)
        drawArrow(ctx, screenX, screenY, screenX + ax * scale * aScale, screenY - ay * scale * aScale, '#ef4444');

        // Draw object
        ctx.beginPath();
        ctx.arc(screenX, screenY, 8, 0, 2 * Math.PI);
        ctx.fillStyle = '#1f2937';
        ctx.fill();

        animationId = requestAnimationFrame(render);
    }

    toggleBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        toggleBtn.innerText = isPlaying ? "Pause" : "Play";
        if (isPlaying) lastTimestamp = performance.now(); // avoid big jump
    });

    // Start animation loop
    animationId = requestAnimationFrame(render);
</script>

</body>
</html>
