<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 08 - Relative Motion</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #111827; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            font-weight: bold;
        }
        select {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #d1d5db;
            font-size: 1em;
        }
        button {
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        canvas {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 100%;
            margin-top: 10px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-weight: bold;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 16px; height: 16px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Relative Motion Animation</h1>
    <p>Visualizing <strong>v_A = (3, 1)</strong> and <strong>v_B = (1, -2)</strong> from different perspectives.</p>

    <div class="controls">
        <div class="control-group">
            <label for="frameSelect">Reference Frame:</label>
            <select id="frameSelect">
                <option value="global">Global Origin (0,0)</option>
                <option value="bodyA">Attached to Body A</option>
                <option value="bodyB">Attached to Body B</option>
            </select>
        </div>
        <button id="resetBtn">Restart Animation</button>
    </div>

    <canvas id="animCanvas" width="800" height="500"></canvas>
    
    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background:#3b82f6;"></div> Body A</div>
        <div class="legend-item"><div class="color-box" style="background:#ef4444;"></div> Body B</div>
        <div class="legend-item"><div class="color-box" style="background:#10b981;"></div> Origin (0,0)</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('animCanvas');
    const ctx = canvas.getContext('2d');
    const frameSelect = document.getElementById('frameSelect');
    const resetBtn = document.getElementById('resetBtn');

    // Absolute velocities
    const vA = { x: 3, y: 1 };
    const vB = { x: 1, y: -2 };
    
    let time = 0;
    let lastTimestamp = 0;
    let animationId = null;

    function resetAnim() {
        time = 0;
    }

    function drawArrow(ctx, fromX, fromY, toX, toY, color) {
        const headlen = 10; 
        const dx = toX - fromX;
        const dy = toY - fromY;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 2;
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.lineTo(toX, toY);
        ctx.fill();
    }

    function render(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        let dt = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        time += dt;
        if (time > 5) time = 0; // loop after 5 seconds

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Center of canvas
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const scale = 30; // pixels per distance unit

        const frame = frameSelect.value;
        
        // Determine the offset of our "camera"
        let offsetX = 0;
        let offsetY = 0;

        if (frame === 'bodyA') {
            offsetX = vA.x * time;
            offsetY = vA.y * time;
        } else if (frame === 'bodyB') {
            offsetX = vB.x * time;
            offsetY = vB.y * time;
        }

        function mapX(x) { return cx + (x - offsetX) * scale; }
        function mapY(y) { return cy - (y - offsetY) * scale; } // y is up

        // Draw grid lines relative to the camera
        ctx.strokeStyle = '#f3f4f6';
        ctx.lineWidth = 1;
        for (let i = -20; i <= 20; i++) {
            ctx.beginPath();
            ctx.moveTo(mapX(i), 0); ctx.lineTo(mapX(i), canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, mapY(i)); ctx.lineTo(canvas.width, mapY(i));
            ctx.stroke();
        }

        // Draw Origin Axes
        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(mapX(-100), mapY(0)); ctx.lineTo(mapX(100), mapY(0)); // X axis
        ctx.moveTo(mapX(0), mapY(-100)); ctx.lineTo(mapX(0), mapY(100)); // Y axis
        ctx.stroke();

        // Draw Origin Point
        ctx.beginPath();
        ctx.arc(mapX(0), mapY(0), 5, 0, 2*Math.PI);
        ctx.fillStyle = '#10b981';
        ctx.fill();

        // Calculate current absolute positions
        const posA = { x: vA.x * time, y: vA.y * time };
        const posB = { x: vB.x * time, y: vB.y * time };

        // Draw trails
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2;
        
        ctx.strokeStyle = '#3b82f6';
        ctx.beginPath(); ctx.moveTo(mapX(0), mapY(0)); ctx.lineTo(mapX(posA.x), mapY(posA.y)); ctx.stroke();
        
        ctx.strokeStyle = '#ef4444';
        ctx.beginPath(); ctx.moveTo(mapX(0), mapY(0)); ctx.lineTo(mapX(posB.x), mapY(posB.y)); ctx.stroke();
        
        ctx.setLineDash([]);

        // Draw Bodies
        // Body A
        ctx.beginPath();
        ctx.arc(mapX(posA.x), mapY(posA.y), 8, 0, 2*Math.PI);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        
        // Body B
        ctx.beginPath();
        ctx.arc(mapX(posB.x), mapY(posB.y), 8, 0, 2*Math.PI);
        ctx.fillStyle = '#ef4444';
        ctx.fill();

        // Draw perceived velocity vectors attached to bodies
        if (frame === 'global') {
            drawArrow(ctx, mapX(posA.x), mapY(posA.y), mapX(posA.x + vA.x), mapY(posA.y + vA.y), '#1e3a8a');
            drawArrow(ctx, mapX(posB.x), mapY(posB.y), mapX(posB.x + vB.x), mapY(posB.y + vB.y), '#991b1b');
        } else if (frame === 'bodyA') {
            // A is stationary, B moves relative to A
            const vRelB = { x: vB.x - vA.x, y: vB.y - vA.y };
            drawArrow(ctx, mapX(posB.x), mapY(posB.y), mapX(posB.x + vRelB.x), mapY(posB.y + vRelB.y), '#991b1b');
        } else if (frame === 'bodyB') {
            // B is stationary, A moves relative to B
            const vRelA = { x: vA.x - vB.x, y: vA.y - vB.y };
            drawArrow(ctx, mapX(posA.x), mapY(posA.y), mapX(posA.x + vRelA.x), mapY(posA.y + vRelA.y), '#1e3a8a');
        }

        animationId = requestAnimationFrame(render);
    }

    resetBtn.addEventListener('click', resetAnim);
    frameSelect.addEventListener('change', resetAnim);

    animationId = requestAnimationFrame(render);
</script>

</body>
</html>
