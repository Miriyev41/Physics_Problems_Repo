<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 08 - Relative Motion Animation</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        .canvas-container { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        canvas { border: 2px solid #333; background: white; width: 300px; height: 300px; }
        .controls { background: #ddd; padding: 15px; border-radius: 8px; margin-top: 20px; }
        h3 { margin-top: 5px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <h1>Relative Reference Frames</h1>
    <div class="controls">
        <button onclick="reset()">Restart Animation</button>
    </div>
    <div class="canvas-container">
        <div><h3>Lab Frame (O)</h3><canvas id="labCanvas"></canvas></div>
        <div><h3>Frame A (A is stationary)</h3><canvas id="frameACanvas"></canvas></div>
        <div><h3>Frame B (B is stationary)</h3><canvas id="frameBCanvas"></canvas></div>
    </div>

<script>
    const labCtx = document.getElementById('labCanvas').getContext('2d');
    const aCtx = document.getElementById('frameACanvas').getContext('2d');
    const bCtx = document.getElementById('frameBCanvas').getContext('2d');

    const posA = { x: 50, y: 150 };
    const velA = { x: 20, y: -10 };
    const posB = { x: 50, y: 50 };
    const velB = { x: 15, y: 15 };

    let t = 0;

    function draw() {
        t += 0.02;
        if (t > 10) t = 0;

        clearAll();
        
        // Lab Frame
        drawPoint(labCtx, posA.x + velA.x * t, posA.y + velA.y * t, 'red', 'A');
        drawPoint(labCtx, posB.x + velB.x * t, posB.y + velB.y * t, 'blue', 'B');

        // Frame A (A is at origin)
        drawPoint(aCtx, 150, 150, 'red', 'A (Origin)');
        const relBX = 150 + (posB.x - posA.x) + (velB.x - velA.x) * t;
        const relBY = 150 + (posB.y - posA.y) + (velB.y - velA.y) * t;
        drawPoint(aCtx, relBX, relBY, 'blue', 'B');

        // Frame B (B is at origin)
        drawPoint(bCtx, 150, 150, 'blue', 'B (Origin)');
        const relAX = 150 + (posA.x - posB.x) + (velA.x - velB.x) * t;
        const relAY = 150 + (posA.y - posB.y) + (velA.y - velB.y) * t;
        drawPoint(bCtx, relAX, relAY, 'red', 'A');

        requestAnimationFrame(draw);
    }

    function drawPoint(ctx, x, y, color, label) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillText(label, x + 7, y - 7);
    }

    function clearAll() {
        [labCtx, aCtx, bCtx].forEach(c => c.clearRect(0, 0, 300, 300));
    }

    function reset() { t = 0; }
    draw();
</script>
</body>
</html>
