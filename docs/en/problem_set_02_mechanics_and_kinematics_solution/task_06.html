<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 06 - Cycloid Animation</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #111827; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            font-weight: bold;
            min-width: 90px;
        }
        input[type="range"] { width: 120px; }
        span.value-display {
            min-width: 50px;
            text-align: right;
            font-family: monospace;
            font-size: 1.1em;
        }
        button {
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        canvas {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 100%;
            margin-top: 10px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-weight: bold;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 16px; height: 16px; border-radius: 4px; }
        .stats {
            margin-top: 15px;
            padding: 10px;
            background: #1f2937;
            color: #10b981;
            border-radius: 6px;
            font-family: monospace;
            display: flex;
            justify-content: space-around;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Cycloid: Rolling Circle Kinematics</h1>
    <p>Visualizing the path of a point on the rim of a circle rolling without slipping.</p>

    <div class="controls">
        <div class="control-group">
            <label for="rSlider">Radius R:</label>
            <input type="range" id="rSlider" min="20" max="80" step="5" value="40">
            <span class="value-display" id="rValue">40</span>
        </div>
        <div class="control-group">
            <label for="omegaSlider">Angular ω:</label>
            <input type="range" id="omegaSlider" min="0.5" max="3" step="0.1" value="1.5">
            <span class="value-display" id="omegaValue">1.5</span>
        </div>
        <div class="control-group">
            <input type="checkbox" id="showVectors" checked>
            <label for="showVectors">Show Vectors</label>
        </div>
        <button id="toggleBtn">Pause</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div class="stats" id="statsDisplay">
        <div id="vStat">|v| = 0.00</div>
        <div id="aStat">|a| = 0.00</div>
    </div>

    <canvas id="animCanvas" width="800" height="300"></canvas>
    
    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background:#d1d5db;"></div> Cycloid Trace</div>
        <div class="legend-item"><div class="color-box" style="background:#10b981;"></div> Velocity v(t)</div>
        <div class="legend-item"><div class="color-box" style="background:#ef4444;"></div> Acceleration a(t)</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('animCanvas');
    const ctx = canvas.getContext('2d');
    
    const rSlider = document.getElementById('rSlider');
    const omegaSlider = document.getElementById('omegaSlider');
    const rValue = document.getElementById('rValue');
    const omegaValue = document.getElementById('omegaValue');
    const showVectorsCheckbox = document.getElementById('showVectors');
    const toggleBtn = document.getElementById('toggleBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    const vStat = document.getElementById('vStat');
    const aStat = document.getElementById('aStat');

    let time = 0;
    let isPlaying = true;
    let lastTimestamp = 0;
    let tracePoints = [];

    function resetAnim() {
        time = 0;
        tracePoints = [];
    }

    function drawArrow(ctx, fromX, fromY, toX, toY, color) {
        const headlen = 10; 
        const dx = toX - fromX;
        const dy = toY - fromY;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 2;
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.lineTo(toX, toY);
        ctx.fill();
    }

    function render(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        let dt = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        if (isPlaying) {
            time += dt;
        }

        const R = parseFloat(rSlider.value);
        const omega = parseFloat(omegaSlider.value);

        rValue.innerText = R;
        omegaValue.innerText = omega.toFixed(1);

        const groundY = canvas.height - 40;

        // Kinematics
        const cx = R * omega * time; // center x
        const cy = groundY - R;      // center y
        
        const px = R * (omega * time - Math.sin(omega * time));
        const py = groundY - R * (1 - Math.cos(omega * time));
        
        const vx = R * omega * (1 - Math.cos(omega * time));
        const vy = -R * omega * Math.sin(omega * time); // Negative because canvas Y is down
        
        const ax = R * omega * omega * Math.sin(omega * time);
        const ay = -R * omega * omega * Math.cos(omega * time); // Negative because canvas Y is down

        const vMag = Math.sqrt(vx*vx + vy*vy);
        const aMag = R * omega * omega;

        vStat.innerText = `|v| = ${vMag.toFixed(2)}`;
        aStat.innerText = `|a| = ${aMag.toFixed(2)}`;

        // If circle goes off screen, wrap around and reset trace
        if (cx - R > canvas.width) {
            resetAnim();
        }

        // Store trace
        if (isPlaying) {
            tracePoints.push({x: px, y: py});
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Ground
        ctx.beginPath();
        ctx.strokeStyle = '#4b5563';
        ctx.lineWidth = 2;
        ctx.moveTo(0, groundY);
        ctx.lineTo(canvas.width, groundY);
        ctx.stroke();

        // Draw Trace
        ctx.beginPath();
        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 3;
        for (let i = 0; i < tracePoints.length; i++) {
            if (i === 0) ctx.moveTo(tracePoints[i].x, tracePoints[i].y);
            else ctx.lineTo(tracePoints[i].x, tracePoints[i].y);
        }
        ctx.stroke();

        // Draw Circle
        ctx.beginPath();
        ctx.strokeStyle = '#9ca3af';
        ctx.lineWidth = 2;
        ctx.arc(cx, cy, R, 0, 2 * Math.PI);
        ctx.stroke();

        // Draw spoke from center to point
        ctx.beginPath();
        ctx.strokeStyle = '#9ca3af';
        ctx.moveTo(cx, cy);
        ctx.lineTo(px, py);
        ctx.stroke();

        // Draw Center Point
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#6b7280';
        ctx.fill();

        // Draw Vectors
        if (showVectorsCheckbox.checked) {
            const vScale = 0.5;
            const aScale = 0.5;
            // Velocity
            drawArrow(ctx, px, py, px + vx * vScale, py + vy * vScale, '#10b981');
            // Acceleration
            drawArrow(ctx, px, py, px + ax * aScale, py + ay * aScale, '#ef4444');
        }

        // Draw Rim Point
        ctx.beginPath();
        ctx.arc(px, py, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();

        requestAnimationFrame(render);
    }

    toggleBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        toggleBtn.innerText = isPlaying ? "Play" : "Pause";
        if (isPlaying) lastTimestamp = performance.now();
    });

    resetBtn.addEventListener('click', resetAnim);

    rSlider.addEventListener('input', () => { if(!isPlaying) resetAnim(); });
    omegaSlider.addEventListener('input', () => { if(!isPlaying) resetAnim(); });

    requestAnimationFrame(render);
</script>

</body>
</html>
