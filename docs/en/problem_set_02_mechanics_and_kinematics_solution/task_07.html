<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 07 - Quadratic Drag Simulation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .container { max-width: 900px; margin: auto; }
        .controls { display: flex; gap: 10px; background: #eee; padding: 15px; border-radius: 5px; }
        canvas { border: 1px solid #ccc; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Projectile Motion: Quadratic Air Resistance</h1>
    <div class="controls">
        <label>Drag Coeff (k): <input type="number" id="kInput" value="0.01" step="0.005"></label>
        <label>Initial V: <input type="number" id="v0Input" value="50"></label>
        <label>Angle: <input type="number" id="angleInput" value="45"></label>
        <button onclick="simulate()">Simulate (Euler)</button>
    </div>
    <canvas id="dragChart"></canvas>
</div>

<script>
    let chart = null;

    function simulate() {
        const k = parseFloat(document.getElementById('kInput').value);
        const v0 = parseFloat(document.getElementById('v0Input').value);
        const angle = parseFloat(document.getElementById('angleInput').value) * Math.PI / 180;
        const g = 9.81;
        const dt = 0.01;

        let x = 0, y = 0;
        let vx = v0 * Math.cos(angle);
        let vy = v0 * Math.sin(angle);
        
        const pathData = [];

        while (y >= 0) {
            pathData.push({x: x, y: y});
            let v = Math.sqrt(vx*vx + vy*vy);
            let ax = -k * v * vx;
            let ay = -g - k * v * vy;

            x += vx * dt;
            y += vy * dt;
            vx += ax * dt;
            vy += ay * dt;
            
            if (pathData.length > 5000) break; // Safety
        }

        const ctx = document.getElementById('dragChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Quadratic Drag Trajectory',
                    data: pathData,
                    showLine: true,
                    borderColor: 'blue',
                    pointRadius: 0
                }]
            },
            options: { scales: { x: {title: {display:true, text:'Distance (m)'}}, y: {title: {display:true, text:'Height (m)'}} } }
        });
    }
    window.onload = simulate;
</script>
</body>
</html>
