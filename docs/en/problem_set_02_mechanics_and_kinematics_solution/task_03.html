<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 03 - Parametric Trajectory Visualization</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #111827; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        label {
            font-weight: bold;
            min-width: 80px;
        }
        input[type="range"] {
            flex-grow: 1;
        }
        span.value-display {
            min-width: 60px;
            text-align: right;
            font-family: monospace;
            font-size: 1.1em;
        }
        canvas {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 100%;
            margin-top: 20px;
        }
        .stats {
            margin-top: 15px;
            padding: 15px;
            background: #1f2937;
            color: #10b981;
            border-radius: 6px;
            font-family: monospace;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-weight: bold;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 16px; height: 16px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Parametric Trajectory: x(t)=2t², y(t)=3t³</h1>
    <p>Visualizing the trajectory, velocity, and acceleration vectors along the curve.</p>

    <div class="controls">
        <label for="tSlider">Time (t):</label>
        <input type="range" id="tSlider" min="0" max="3" step="0.05" value="1.5">
        <span class="value-display" id="tValue">1.5 s</span>
    </div>

    <div class="stats" id="statsDisplay">
        <div id="posStat">r = (0.0, 0.0)</div>
        <div id="velStat">v = (0.0, 0.0) | |v| = 0.0</div>
        <div id="accStat">a = (0.0, 0.0) | |a| = 0.0</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background:#d1d5db;"></div> Trajectory</div>
        <div class="legend-item"><div class="color-box" style="background:#10b981;"></div> v(t)</div>
        <div class="legend-item"><div class="color-box" style="background:#ef4444;"></div> a(t)</div>
    </div>

    <canvas id="plotCanvas" width="800" height="500"></canvas>
</div>

<script>
    const canvas = document.getElementById('plotCanvas');
    const ctx = canvas.getContext('2d');
    
    const tSlider = document.getElementById('tSlider');
    const tValue = document.getElementById('tValue');
    const posStat = document.getElementById('posStat');
    const velStat = document.getElementById('velStat');
    const accStat = document.getElementById('accStat');

    function drawArrow(ctx, fromX, fromY, toX, toY, color) {
        const headlen = 10; 
        const dx = toX - fromX;
        const dy = toY - fromY;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 2;
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.lineTo(toX, toY);
        ctx.fill();
    }

    function drawPlot() {
        const t = parseFloat(tSlider.value);
        tValue.innerText = t.toFixed(2) + " s";

        // Kinematic variables
        const x = 2 * t * t;
        const y = 3 * t * t * t;
        const vx = 4 * t;
        const vy = 9 * t * t;
        const ax = 4;
        const ay = 18 * t;
        
        const vMag = Math.sqrt(vx*vx + vy*vy);
        const aMag = Math.sqrt(ax*ax + ay*ay);

        posStat.innerText = `r(t) = (${x.toFixed(1)}, ${y.toFixed(1)}) m`;
        velStat.innerText = `v(t) = (${vx.toFixed(1)}, ${vy.toFixed(1)}) m/s | |v| = ${vMag.toFixed(1)} m/s`;
        accStat.innerText = `a(t) = (${ax.toFixed(1)}, ${ay.toFixed(1)}) m/s² | |a| = ${aMag.toFixed(1)} m/s²`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const marginX = 50;
        const marginY = 50;
        const width = canvas.width - marginX * 2;
        const height = canvas.height - marginY * 2;

        const tMax = 3;
        const xMax = 2 * tMax * tMax;     // 18
        const yMax = 3 * tMax * tMax * tMax; // 81

        function mapX(val) { return marginX + (val / xMax) * width; }
        function mapY(val) { return canvas.height - marginY - (val / yMax) * height; }

        // Axes
        ctx.strokeStyle = '#9ca3af';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(mapX(0), mapY(0)); ctx.lineTo(mapX(xMax*1.05), mapY(0));
        ctx.moveTo(mapX(0), mapY(0)); ctx.lineTo(mapX(0), mapY(yMax*1.05));
        ctx.stroke();

        // Draw full trajectory
        ctx.beginPath();
        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 3;
        for (let t_i = 0; t_i <= tMax; t_i += 0.05) {
            let px = 2 * t_i * t_i;
            let py = 3 * t_i * t_i * t_i;
            if (t_i === 0) ctx.moveTo(mapX(px), mapY(py));
            else ctx.lineTo(mapX(px), mapY(py));
        }
        ctx.stroke();

        // Draw current trajectory up to t
        ctx.beginPath();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 3;
        for (let t_i = 0; t_i <= t; t_i += 0.02) {
            let px = 2 * t_i * t_i;
            let py = 3 * t_i * t_i * t_i;
            if (t_i === 0) ctx.moveTo(mapX(px), mapY(py));
            else ctx.lineTo(mapX(px), mapY(py));
        }
        ctx.stroke();

        // Current point
        const cx = mapX(x);
        const cy = mapY(y);
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, 2*Math.PI);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();

        // Vector scaling for visualization
        const vScale = 0.5;
        const aScale = 0.5;

        // Draw Velocity
        drawArrow(ctx, cx, cy, cx + vx * vScale * (width/xMax), cy - vy * vScale * (height/yMax), '#10b981');
        
        // Draw Acceleration
        drawArrow(ctx, cx, cy, cx + ax * aScale * (width/xMax), cy - ay * aScale * (height/yMax), '#ef4444');
    }

    tSlider.addEventListener('input', drawPlot);

    drawPlot();
</script>

</body>
</html>
