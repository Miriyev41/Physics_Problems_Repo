<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 03 - Harmonic Wave</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #111827; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label { font-weight: bold; min-width: 140px; }
        input[type="range"] { flex-grow: 1; }
        span.value-display {
            min-width: 60px;
            text-align: right;
            font-family: monospace;
            font-size: 1.1em;
        }
        canvas {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 100%;
            margin-top: 20px;
        }
        .stats {
            margin-top: 15px;
            padding: 15px;
            background: #1f2937;
            color: #10b981;
            border-radius: 6px;
            font-family: monospace;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            text-align: center;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-weight: bold;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 16px; height: 16px; border-radius: 4px; }
        button {
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            grid-column: span 2;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h1>Harmonic Wave Propagation</h1>
    <p>Visualizing <strong>y(x,t) = A sin(kx - ωt)</strong>.</p>

    <div class="controls">
        <div class="control-group">
            <label for="kSlider">Wave number (k):</label>
            <input type="range" id="kSlider" min="1" max="10" step="0.5" value="3.14">
            <span class="value-display" id="kValue">3.14 m⁻¹</span>
        </div>
        <div class="control-group">
            <label for="omegaSlider">Ang. Freq (ω):</label>
            <input type="range" id="omegaSlider" min="1" max="20" step="1" value="6.28">
            <span class="value-display" id="omegaValue">6.28 rad/s</span>
        </div>
        <button id="toggleBtn">Pause Animation</button>
    </div>

    <div class="stats" id="statsDisplay">
        <div id="wavelengthStat">Wavelength (λ): 0.00 m</div>
        <div id="velocityStat">Phase Velocity (v): 0.00 m/s</div>
        <div id="timeStat">Time (t): 0.00 s</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background:#3b82f6;"></div> Wave Profile</div>
        <div class="legend-item"><div class="color-box" style="background:#ef4444;"></div> Oscillators at x=0 and x=λ</div>
    </div>

    <canvas id="waveCanvas" width="800" height="300"></canvas>
</div>

<script>
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    
    const kSlider = document.getElementById('kSlider');
    const omegaSlider = document.getElementById('omegaSlider');
    const toggleBtn = document.getElementById('toggleBtn');
    
    const kValue = document.getElementById('kValue');
    const omegaValue = document.getElementById('omegaValue');
    const wavelengthStat = document.getElementById('wavelengthStat');
    const velocityStat = document.getElementById('velocityStat');
    const timeStat = document.getElementById('timeStat');

    let time = 0;
    let isPlaying = true;
    let lastTimestamp = 0;

    function render(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        let dt = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        if (isPlaying) {
            time += dt;
        }

        const k = parseFloat(kSlider.value);
        const omega = parseFloat(omegaSlider.value);

        kValue.innerText = k.toFixed(2) + " m⁻¹";
        omegaValue.innerText = omega.toFixed(2) + " rad/s";

        const lambda = (2 * Math.PI) / k;
        const velocity = omega / k;

        wavelengthStat.innerText = `Wavelength (λ): ${lambda.toFixed(2)} m`;
        velocityStat.innerText = `Phase Velocity (v): ${velocity.toFixed(2)} m/s`;
        timeStat.innerText = `Time (t): ${time.toFixed(2)} s`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const marginX = 40;
        const cy = canvas.height / 2;
        const width = canvas.width - marginX * 2;
        const A = 80; // Amplitude for drawing
        const xMax = 10; // 10 meters visible on screen

        function mapX(x) { return marginX + (x / xMax) * width; }

        // Draw Axes
        ctx.strokeStyle = '#9ca3af';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(mapX(0), cy); ctx.lineTo(mapX(xMax), cy);
        ctx.moveTo(mapX(0), cy - A - 20); ctx.lineTo(mapX(0), cy + A + 20);
        ctx.stroke();

        // Draw Wave
        ctx.beginPath();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 3;
        for (let x = 0; x <= xMax; x += 0.05) {
            let y = A * Math.sin(k * x - omega * time);
            if (x === 0) ctx.moveTo(mapX(x), cy - y);
            else ctx.lineTo(mapX(x), cy - y);
        }
        ctx.stroke();

        // Highlight x = 0
        let y0 = A * Math.sin(-omega * time);
        ctx.beginPath();
        ctx.arc(mapX(0), cy - y0, 6, 0, 2*Math.PI);
        ctx.fillStyle = '#ef4444';
        ctx.fill();

        // Highlight x = lambda
        if (lambda <= xMax) {
            let yLambda = A * Math.sin(k * lambda - omega * time);
            ctx.beginPath();
            ctx.arc(mapX(lambda), cy - yLambda, 6, 0, 2*Math.PI);
            ctx.fillStyle = '#ef4444';
            ctx.fill();

            // Draw connecting line to show they are in phase
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
            ctx.setLineDash([5, 5]);
            ctx.moveTo(mapX(0), cy - y0);
            ctx.lineTo(mapX(lambda), cy - yLambda);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        requestAnimationFrame(render);
    }

    toggleBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        toggleBtn.innerText = isPlaying ? "Pause Animation" : "Play Animation";
        if (isPlaying) lastTimestamp = performance.now();
    });

    requestAnimationFrame(render);
</script>

</body>
</html>
