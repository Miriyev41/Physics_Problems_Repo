<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 08 - First-Order Differential Equation</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #111827; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        label {
            font-weight: bold;
            min-width: 150px;
        }
        input[type="range"] {
            flex-grow: 1;
        }
        span.value-display {
            min-width: 50px;
            text-align: right;
            font-family: monospace;
            font-size: 1.1em;
        }
        canvas {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 100%;
            margin-top: 20px;
        }
        .equation-display {
            font-family: monospace;
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 6px;
            font-size: 1.2em;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Differential Equation: dy/dt = -ky</h1>
    <p>Visualizing the analytical solution: <strong>y(t) = y₀ e<sup>-kt</sup></strong></p>

    <div class="controls">
        <div class="control-group">
            <label for="y0Slider">Initial Value y(0) = y₀:</label>
            <input type="range" id="y0Slider" min="-10" max="10" step="0.5" value="5">
            <span class="value-display" id="y0Value">5.0</span>
        </div>
        <div class="control-group">
            <label for="kSlider">Decay constant (k):</label>
            <input type="range" id="kSlider" min="-1" max="2" step="0.1" value="0.5">
            <span class="value-display" id="kValue">0.5</span>
        </div>
    </div>

    <div class="equation-display" id="eqDisplay">
        y(t) = 5.0 * e^(-0.5 * t)
    </div>

    <canvas id="plotCanvas" width="700" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById('plotCanvas');
    const ctx = canvas.getContext('2d');
    
    const y0Slider = document.getElementById('y0Slider');
    const kSlider = document.getElementById('kSlider');
    const y0Value = document.getElementById('y0Value');
    const kValue = document.getElementById('kValue');
    const eqDisplay = document.getElementById('eqDisplay');

    function drawPlot() {
        const y0 = parseFloat(y0Slider.value);
        const k = parseFloat(kSlider.value);
        
        y0Value.innerText = y0.toFixed(1);
        kValue.innerText = k.toFixed(1);
        eqDisplay.innerText = `y(t) = ${y0.toFixed(1)} * e^(-${k.toFixed(1)} * t)`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const marginX = 40;
        const marginY = 20;
        const width = canvas.width - marginX * 2;
        const height = canvas.height - marginY * 2;

        const tMax = 10;
        const yMax = 15; // Abs max for Y axis
        const yMin = -15;

        function mapT(t) {
            return marginX + (t / tMax) * width;
        }

        function mapY(y) {
            // y goes from yMin to yMax
            let normalizedY = (y - yMin) / (yMax - yMin);
            return canvas.height - marginY - normalizedY * height;
        }

        // Draw grid and axes
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#e5e7eb';
        for(let i = -15; i <= 15; i+=5) {
            ctx.beginPath();
            ctx.moveTo(mapT(0), mapY(i));
            ctx.lineTo(mapT(tMax), mapY(i));
            ctx.stroke();
        }

        // T-axis (Y=0)
        ctx.strokeStyle = '#9ca3af';
        ctx.beginPath();
        ctx.moveTo(mapT(0), mapY(0));
        ctx.lineTo(mapT(tMax), mapY(0));
        ctx.stroke();

        // Y-axis (T=0)
        ctx.beginPath();
        ctx.moveTo(mapT(0), mapY(yMin));
        ctx.lineTo(mapT(0), mapY(yMax));
        ctx.stroke();

        // Draw curve
        ctx.strokeStyle = '#3b82f6'; // Blue
        ctx.lineWidth = 3;
        ctx.beginPath();
        
        let firstPoint = true;
        for (let t = 0; t <= tMax; t += 0.05) {
            let y = y0 * Math.exp(-k * t);
            
            let px = mapT(t);
            let py = mapY(y);

            // Clip drawing to graph bounds
            if (y > yMax || y < yMin) {
                firstPoint = true;
                continue;
            }

            if (firstPoint) {
                ctx.moveTo(px, py);
                firstPoint = false;
            } else {
                ctx.lineTo(px, py);
            }
        }
        ctx.stroke();
    }

    // Event listeners
    y0Slider.addEventListener('input', drawPlot);
    kSlider.addEventListener('input', drawPlot);

    // Initial draw
    drawPlot();
</script>

</body>
</html>
