<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 06 - Arc Length & Numerical Integration</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .control-panel { margin-bottom: 20px; padding: 15px; background-color: #eef; border-radius: 6px; }
        label { font-weight: bold; margin-right: 10px; }
        input[type="number"] { padding: 5px; width: 80px; }
        button { padding: 8px 15px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004494; }
        .results { margin-top: 15px; padding: 15px; background-color: #f4f4f4; border-left: 4px solid #0056b3; }
        .chart-container { display: flex; flex-direction: column; gap: 30px; margin-top: 20px; }
        canvas { max-height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Numerical Arc Length Calculator</h1>
    <p>Trajectory: <strong>x(t) = t, y(t) = t²</strong> for t ∈ [0, 1]</p>
    
    <div class="control-panel">
        <label for="n-input">Divisions (N) for Trapezoidal Rule:</label>
        <input type="number" id="n-input" value="10" min="1" max="10000">
        <button onclick="runAnalysis()">Calculate & Plot</button>
    </div>

    <div class="results" id="results-box">
        </div>

    <div class="chart-container">
        <div>
            <h2>Trajectory Plot</h2>
            <canvas id="trajectoryChart"></canvas>
        </div>
        <div>
            <h2>Error Convergence (Error vs. N)</h2>
            <canvas id="errorChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Exact analytical value calculated in the derivations
    const EXACT_LENGTH = Math.sqrt(5)/2 + 0.25 * Math.log(2 + Math.sqrt(5));

    // The function to integrate: f(t) = |v(t)| = sqrt(1 + 4t^2)
    function speedMagnitude(t) {
        return Math.sqrt(1 + 4 * t * t);
    }

    // Trapezoidal rule implementation
    function trapezoidalRule(N) {
        const a = 0;
        const b = 1;
        const dt = (b - a) / N;
        let sum = (speedMagnitude(a) + speedMagnitude(b)) / 2;
        
        for (let i = 1; i < N; i++) {
            sum += speedMagnitude(a + i * dt);
        }
        
        return sum * dt;
    }

    // Trajectory coordinates
    function generateTrajectoryData() {
        const data = [];
        for (let t = 0; t <= 1; t += 0.05) {
            data.push({ x: t, y: t * t });
        }
        return data;
    }

    // Chart instances
    let trajChartInstance = null;
    let errChartInstance = null;

    function initCharts() {
        // Plot Trajectory (Static)
        const trajCtx = document.getElementById('trajectoryChart').getContext('2d');
        trajChartInstance = new Chart(trajCtx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'y = x²',
                    data: generateTrajectoryData(),
                    borderColor: '#ff6384',
                    backgroundColor: '#ff6384',
                    showLine: true,
                    tension: 0.4
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'x(t)' } },
                    y: { title: { display: true, text: 'y(t)' } }
                }
            }
        });
    }

    function runAnalysis() {
        const maxN = parseInt(document.getElementById('n-input').value);
        if (isNaN(maxN) || maxN < 1) {
            alert("Please enter a valid number for N.");
            return;
        }

        // 1. Calculate Single Result for requested N
        const numResult = trapezoidalRule(maxN);
        const errorVal = Math.abs(numResult - EXACT_LENGTH);

        // Update Results Box
        document.getElementById('results-box').innerHTML = `
            <p><strong>Exact Analytical Length:</strong> ${EXACT_LENGTH.toFixed(10)}</p>
            <p><strong>Numerical Length (N=${maxN}):</strong> ${numResult.toFixed(10)}</p>
            <p><strong>Absolute Error:</strong> ${errorVal.toExponential(4)}</p>
        `;

        // 2. Generate Data for Error Convergence Chart
        // We will test several values of N up to maxN to show the curve
        const nValues = [];
        const errorData = [];
        
        // Define step size to avoid plotting too many points if maxN is huge
        let step = Math.max(1, Math.floor(maxN / 50)); 

        for (let n = 1; n <= maxN; n += step) {
            let res = trapezoidalRule(n);
            let err = Math.abs(res - EXACT_LENGTH);
            nValues.push(n);
            errorData.push(err);
        }

        // Add the final point if not included
        if (nValues[nValues.length - 1] !== maxN) {
            nValues.push(maxN);
            errorData.push(errorVal);
        }

        // Update Error Chart
        const errCtx = document.getElementById('errorChart').getContext('2d');
        
        if (errChartInstance) {
            errChartInstance.destroy();
        }

        errChartInstance = new Chart(errCtx, {
            type: 'line',
            data: {
                labels: nValues,
                datasets: [{
                    label: 'Absolute Error',
                    data: errorData,
                    borderColor: '#36a2eb',
                    backgroundColor: 'rgba(54, 162, 235, 0.1)',
                    fill: true,
                    tension: 0.1
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Number of Divisions (N)' } },
                    y: { 
                        type: 'logarithmic', // Log scale shows power-law convergence clearly
                        title: { display: true, text: 'Log Absolute Error' } 
                    }
                }
            }
        });
    }

    // Initialize on load
    window.onload = () => {
        initCharts();
        runAnalysis();
    };
</script>

</body>
</html>
