<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 07 - Work Line Integral & Riemann Sum</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .control-panel { margin-bottom: 20px; padding: 15px; background-color: #eef; border-radius: 6px; }
        label { font-weight: bold; margin-right: 10px; }
        input[type="number"] { padding: 5px; width: 100px; }
        button { padding: 8px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .results { margin-top: 15px; padding: 15px; background-color: #f4f4f4; border-left: 4px solid #28a745; }
        .chart-container { margin-top: 30px; }
        canvas { max-height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Numerical Riemann Sum Calculator for Work</h1>
    <p>Function to integrate: <strong>f(t) = F(t) · v(t) = 5t²</strong> for t ∈ [0, 1]</p>
    
    <div class="control-panel">
        <label for="n-input">Number of Rectangles (N):</label>
        <input type="number" id="n-input" value="50" min="1" max="100000">
        <button onclick="runAnalysis()">Calculate Riemann Sum</button>
    </div>

    <div class="results" id="results-box">
        </div>

    <div class="chart-container">
        <h2>Riemann Sum Error Convergence</h2>
        <canvas id="errorChart"></canvas>
    </div>
</div>

<script>
    // Exact analytical value calculated in the derivations
    const EXACT_WORK = 5 / 3;

    // The integrand function: f(t) = F · v = 5t^2
    function powerFunction(t) {
        return 5 * t * t;
    }

    // Right Riemann Sum implementation
    function rightRiemannSum(N) {
        const a = 0;
        const b = 1;
        const dt = (b - a) / N;
        let sum = 0;
        
        for (let i = 1; i <= N; i++) {
            let ti = a + i * dt; // Right endpoint
            sum += powerFunction(ti);
        }
        
        return sum * dt;
    }

    let errChartInstance = null;

    function runAnalysis() {
        const maxN = parseInt(document.getElementById('n-input').value);
        if (isNaN(maxN) || maxN < 1) {
            alert("Please enter a valid positive integer for N.");
            return;
        }

        // 1. Calculate Single Result for requested N
        const numResult = rightRiemannSum(maxN);
        const errorVal = Math.abs(numResult - EXACT_WORK);

        // Update Results Box
        document.getElementById('results-box').innerHTML = `
            <p><strong>Exact Analytical Work:</strong> ${EXACT_WORK.toFixed(10)} (approx 1.666666...)</p>
            <p><strong>Numerical Work (Riemann Sum, N=${maxN}):</strong> ${numResult.toFixed(10)}</p>
            <p><strong>Absolute Error:</strong> ${errorVal.toExponential(4)}</p>
        `;

        // 2. Generate Data for Error Convergence Chart
        const nValues = [];
        const errorData = [];
        
        let step = Math.max(1, Math.floor(maxN / 50)); 

        for (let n = 1; n <= maxN; n += step) {
            let res = rightRiemannSum(n);
            let err = Math.abs(res - EXACT_WORK);
            nValues.push(n);
            errorData.push(err);
        }

        if (nValues[nValues.length - 1] !== maxN) {
            nValues.push(maxN);
            errorData.push(errorVal);
        }

        // Update Error Chart
        const errCtx = document.getElementById('errorChart').getContext('2d');
        
        if (errChartInstance) {
            errChartInstance.destroy();
        }

        errChartInstance = new Chart(errCtx, {
            type: 'line',
            data: {
                labels: nValues,
                datasets: [{
                    label: 'Absolute Error of Right Riemann Sum',
                    data: errorData,
                    borderColor: '#ffc107',
                    backgroundColor: 'rgba(255, 193, 7, 0.2)',
                    fill: true,
                    tension: 0.1
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Number of Rectangles (N)' } },
                    y: { 
                        type: 'logarithmic', 
                        title: { display: true, text: 'Log Absolute Error' } 
                    }
                }
            }
        });
    }

    window.onload = () => {
        runAnalysis();
    };
</script>

</body>
</html>
