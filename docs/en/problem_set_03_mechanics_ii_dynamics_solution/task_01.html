<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 01 - Trajectory with Constant Force</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #111827; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #eff6ff;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        button {
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        canvas {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 100%;
            margin-top: 10px;
        }
        .stats {
            margin-top: 15px;
            padding: 15px;
            background: #1f2937;
            color: #10b981;
            border-radius: 6px;
            font-family: monospace;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>2D Motion Trajectory</h1>
    <p>Visualizing the path of a particle under a constant force <strong>F = (6, 2) N</strong>.</p>

    <div class="controls">
        <button id="toggleBtn">Play Animation</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div class="stats" id="statsDisplay">
        <div id="tStat">Time: 0.00 s</div>
        <div id="wStat">Work Done: 0.00 J</div>
        <div id="rStat">Position: (0.00, 0.00)</div>
        <div id="kStat">Kinetic Energy: 2.00 J</div>
    </div>

    <canvas id="animCanvas" width="700" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById('animCanvas');
    const ctx = canvas.getContext('2d');
    
    const toggleBtn = document.getElementById('toggleBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    const tStat = document.getElementById('tStat');
    const wStat = document.getElementById('wStat');
    const rStat = document.getElementById('rStat');
    const kStat = document.getElementById('kStat');

    let time = 0;
    let isPlaying = false;
    let lastTimestamp = 0;
    const tMax = 3; 

    function resetAnim() {
        time = 0;
        isPlaying = false;
        toggleBtn.innerText = "Play Animation";
        drawFrame();
    }

    function drawFrame() {
        // Kinematic equations
        const x = time + 1.5 * time * time;
        const y = -time + 0.5 * time * time;
        
        const vx = 1 + 3 * time;
        const vy = -1 + time;
        
        const work = 6 * x + 2 * y;
        const kinetic = 0.5 * 2 * (vx*vx + vy*vy);

        tStat.innerText = `Time: ${time.toFixed(2)} s`;
        rStat.innerText = `Position: (${x.toFixed(2)}, ${y.toFixed(2)}) m`;
        wStat.innerText = `Work Done: ${work.toFixed(2)} J`;
        kStat.innerText = `Kinetic Energy: ${kinetic.toFixed(2)} J`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Coordinate mapping
        const marginX = 50;
        const marginY = 50;
        const width = canvas.width - marginX * 2;
        const height = canvas.height - marginY * 2;

        const xMax = 18; 
        const yMin = -1;
        const yMax = 2;
        
        function mapX(val) { return marginX + (val / xMax) * width; }
        function mapY(val) { return canvas.height - marginY - ((val - yMin) / (yMax - yMin)) * height; }

        // Draw Axes
        ctx.beginPath();
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 2;
        ctx.moveTo(mapX(0), mapY(0)); ctx.lineTo(mapX(xMax), mapY(0)); // X-axis
        ctx.moveTo(mapX(0), mapY(yMin)); ctx.lineTo(mapX(0), mapY(yMax)); // Y-axis
        ctx.stroke();

        // Draw Target Time Path (Trace)
        ctx.beginPath();
        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        for (let t_i = 0; t_i <= tMax; t_i += 0.05) {
            let px = t_i + 1.5 * t_i * t_i;
            let py = -t_i + 0.5 * t_i * t_i;
            if (t_i === 0) ctx.moveTo(mapX(px), mapY(py));
            else ctx.lineTo(mapX(px), mapY(py));
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw Active Path
        ctx.beginPath();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 3;
        for (let t_i = 0; t_i <= time; t_i += 0.05) {
            let px = t_i + 1.5 * t_i * t_i;
            let py = -t_i + 0.5 * t_i * t_i;
            if (t_i === 0) ctx.moveTo(mapX(px), mapY(py));
            else ctx.lineTo(mapX(px), mapY(py));
        }
        ctx.stroke();

        // Draw Particle
        const screenX = mapX(x);
        const screenY = mapY(y);
        ctx.beginPath();
        ctx.arc(screenX, screenY, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#ef4444';
        ctx.fill();
    }

    function render(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        let dt = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        if (isPlaying) {
            time += dt;
            if (time > tMax) {
                time = tMax;
                isPlaying = false;
                toggleBtn.innerText = "Reset to Play";
            }
            drawFrame();
        }
        requestAnimationFrame(render);
    }

    toggleBtn.addEventListener('click', () => {
        if (time >= tMax) resetAnim();
        isPlaying = !isPlaying;
        toggleBtn.innerText = isPlaying ? "Pause Animation" : "Play Animation";
        if (isPlaying) lastTimestamp = performance.now();
    });

    resetBtn.addEventListener('click', resetAnim);

    drawFrame();
    requestAnimationFrame(render);
</script>

</body>
</html>
