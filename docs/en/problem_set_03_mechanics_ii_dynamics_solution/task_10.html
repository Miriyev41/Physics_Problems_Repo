<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 10 - Anharmonic Oscillator Numerical Model</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #eee; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        label { font-size: 0.9em; font-weight: bold; }
        canvas { border: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="container">
    <h1>Anharmonic Oscillator (Numerical Model)</h1>
    <div class="controls">
        <div><label>k (Linear):</label><br><input type="range" id="kInput" min="0" max="10" value="5" step="0.5"></div>
        <div><label>λ (Anharmonic):</label><br><input type="range" id="lInput" min="0" max="5" value="0.5" step="0.1"></div>
        <div><label>Amplitude (x₀):</label><br><input type="range" id="xInput" min="1" max="10" value="5" step="0.5"></div>
    </div>
    <button onclick="simulate()" style="width:100%; padding: 10px; margin-bottom: 20px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer;">Run Simulation (Velocity Verlet)</button>
    <canvas id="oscChart"></canvas>
</div>

<script>
    let chart = null;

    function simulate() {
        const k = parseFloat(document.getElementById('kInput').value);
        const lambda = parseFloat(document.getElementById('lInput').value);
        const x0 = parseFloat(document.getElementById('xInput').value);
        const m = 1.0;
        const dt = 0.02;
        const steps = 500;

        let x = x0;
        let v = 0;
        const timeData = [];
        const posData = [];

        function getAcc(pos) {
            return (-k * pos - 4 * lambda * Math.pow(pos, 3)) / m;
        }

        let a = getAcc(x);

        for (let i = 0; i < steps; i++) {
            timeData.push((i * dt).toFixed(2));
            posData.push(x);

            // Velocity Verlet Integration
            x = x + v * dt + 0.5 * a * dt * dt;
            let v_mid = v + 0.5 * a * dt;
            a = getAcc(x);
            v = v_mid + 0.5 * a * dt;
        }

        const ctx = document.getElementById('oscChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeData,
                datasets: [{
                    label: 'Position x(t)',
                    data: posData,
                    borderColor: '#3498db',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: {
                animation: false,
                scales: {
                    x: { title: { display: true, text: 'Time (s)' } },
                    y: { title: { display: true, text: 'Position' }, min: -10, max: 10 }
                }
            }
        });
    }

    window.onload = simulate;
</script>
</body>
</html>
