<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 09 - 2D Harmonic Oscillator</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        canvas { border: 1px solid #555; background: #000; cursor: crosshair; }
        .ui { margin: 15px; }
    </style>
</head>
<body>
    <h1>2D Isotropic Harmonic Oscillator</h1>
    <div class="ui">
        <button onclick="reset()">Clear Trace</button>
        <p>Click and drag on the canvas to set initial position and velocity!</p>
    </div>
    <canvas id="simCanvas" width="600" height="600"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const k = 0.01, m = 1, dt = 0.5;
    let x = 100, y = 0, vx = 0, vy = 5;
    let path = [];

    function update() {
        // acceleration a = -k/m * r
        let ax = -(k/m) * x;
        let ay = -(k/m) * y;

        vx += ax * dt;
        vy += ay * dt;
        x += vx * dt;
        y += vy * dt;

        path.push({x, y});
        if (path.length > 1000) path.shift();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Draw Axes
        ctx.strokeStyle = '#333';
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();

        // Draw Trace
        ctx.strokeStyle = '#00ffcc';
        ctx.beginPath();
        path.forEach((p, i) => {
            if (i === 0) ctx.moveTo(cx + p.x, cy + p.y);
            else ctx.lineTo(cx + p.x, cy + p.y);
        });
        ctx.stroke();

        // Draw Particle
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx + x, cy + y, 6, 0, Math.PI * 2);
        ctx.fill();

        update();
        requestAnimationFrame(draw);
    }

    function reset() { path = []; }

    // Interaction
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        x = e.clientX - rect.left - canvas.width/2;
        y = e.clientY - rect.top - canvas.height/2;
        vx = (Math.random() - 0.5) * 10;
        vy = (Math.random() - 0.5) * 10;
        reset();
    };

    draw();
</script>
</body>
</html>
